name = "salesforce-consultants-website"
compatibility_date = "2024-01-01"

# Pages configuration
pages_build_output_dir = "."

# Custom domain configuration
[env.production]
name = "salesforce-consultants-website"
route = "salesforceconsultants.io/*"
zone_id = ""  # You'll need to add your zone ID from Cloudflare

[env.production.routes]
"salesforceconsultants.io" = "salesforce-consultants-website.pages.dev"
"www.salesforceconsultants.io" = "salesforce-consultants-website.pages.dev" 